version: "1"
name: "claude-smoke"
description: "Minimal live Claude adapter smoke test for Conductor."

defaults:
  auto_handoff: true
  review_required: false
  working_directory: "."

handoff:
  path: "handover.smoke.md"
  mode: "replace"
  required_sections:
    - "Current State"
    - "Open Questions"
    - "Next Actions"

agents:
  claude:
    provider: "claude_code"
    model: "sonnet"
    profile: "smoke"
    workspace: "."

steps:
  - id: "smoke"
    title: "Verify the Claude adapter path"
    agent: "claude"
    prompt: |
      Confirm that you can read the workspace and report back through Conductor.
      Mention whether `Cargo.toml` exists in the current workspace.
    on_success:
      route: "halt"
